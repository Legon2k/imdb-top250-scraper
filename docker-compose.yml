name: imdb-ai-pipeline

services:
  # ==========================================
  # 1. INFRASTRUCTURE (DB, Message Broker, UI)
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: imdb_postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - internal_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: imdb_redis
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - internal_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-insight:
    image: redis/redisinsight:latest
    container_name: imdb_redis_insight
    restart: unless-stopped
    ports:
      - "5540:5540"
    networks:
      - internal_network
    depends_on:
      redis:
        condition: service_healthy

  # ==========================================
  # 2. DATA INGESTION (Scraper)
  # ==========================================
  scraper:
    container_name: imdb_scraper
    build: 
      context: ./src/scraper_python
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal_network

  # ==========================================
  # 3. BACKGROUND WORKERS (.NET 10)
  # ==========================================
  worker:
    container_name: imdb_worker
    build: 
      context: ./src/worker_dotnet
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    # Worker needs both Redis and Postgres to be healthy before starting
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - internal_network

# ==========================================
  # 4. API GATEWAY (FastAPI)
  # ==========================================
  api:
    container_name: imdb_api
    build: 
      context: ./src/api_fastapi
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal_network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# ==========================================
  # 5. AI BACKGROUND WORKER (Python)
  # ==========================================
  worker_ai:
    container_name: imdb_ai_worker
    build: 
      context: .
      dockerfile: src/worker_ai_python/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - internal_network

  # ==========================================
  # 6. CONTRACT VALIDATION (Tests)
  # ==========================================
  contract-tests:
    container_name: imdb_contract_tests
    build:
      context: .
      dockerfile: Dockerfile.test
    env_file:
      - .env
    networks:
      - internal_network
    profiles:
      - test

networks:
  internal_network:
    driver: bridge

volumes:
  pg_data:
  redis_data:
