name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'

jobs:
  python-checks:
    name: Python Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install and configure uv with native automatic caching mechanisms
      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      # Synchronize python scraper environment using localized uv toolchain
      - name: Install scraper dependencies
        run: |
          uv sync --project src/scraper_python

      # Handle traditional legacy dependencies for API and contract testing
      - name: Install test dependencies
        run: |
          uv sync --project contracts

      # Lint check using uv execution context inside the scraper folder
      - name: Ruff lint
        run: uv run --project src/scraper_python ruff check .

      # Format validation using uv execution context inside the scraper folder
      - name: Ruff format check
        run: uv run --project src/scraper_python ruff format --check .

      # Unit tests executed via uv runtime environment wrapper
      - name: Scraper unit tests
        run: uv run --project src/scraper_python python -m unittest discover -s src/scraper_python/tests -t src/scraper_python

      - name: API smoke tests
        run: uv run --project src/scraper_python python -m unittest discover -s src/api_fastapi/tests

      - name: Contract sync tests
        run: uv run --project contracts pytest contracts/test_contracts.py -v --tb=short

      # Install and test worker_ai_python dependencies
      - name: Install AI worker dependencies
        run: |
          uv sync --project src/worker_ai_python

      - name: AI worker lint
        run: uv run --project src/worker_ai_python ruff check .

      - name: AI worker format check
        run: uv run --project src/worker_ai_python ruff format --check .

  dotnet-checks:
    name: .NET 10 Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Restore dependencies
        run: dotnet restore src/worker_dotnet/ImdbWorker.slnx

      - name: Build Solution
        run: dotnet build src/worker_dotnet/ImdbWorker.slnx --no-restore --configuration Release

  docker-smoke-test:
    name: Docker Compose Build Validation
    runs-on: ubuntu-latest
    needs: [python-checks, dotnet-checks]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build entire microservice infrastructure
        run: docker compose build