name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'

jobs:
  python-checks:
    name: Python Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/scraper_python/requirements-dev.txt
          pip install -r requirements-test.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Scraper unit tests
        run: python -m unittest discover -s src/scraper_python/tests -t src/scraper_python

      - name: API smoke tests
        run: python -m unittest discover -s src/api_fastapi/tests

      - name: Install contract test dependencies
        run: pip install jsonschema

      - name: Contract sync tests
        run: python -m pytest contracts/test_contracts.py -v --tb=short

  dotnet-checks:
    name: .NET 10 Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Restore dependencies
        run: dotnet restore src/worker_dotnet/ImdbWorker.slnx

      - name: Build Solution
        run: dotnet build src/worker_dotnet/ImdbWorker.slnx --no-restore --configuration Release

  docker-smoke-test:
    name: Docker Compose Build Validation
    runs-on: ubuntu-latest
    needs: [python-checks, dotnet-checks]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build entire microservice infrastructure
        run: docker compose build
